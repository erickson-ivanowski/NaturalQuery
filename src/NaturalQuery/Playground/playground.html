<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NaturalQuery Playground</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e4e4e7;
    --text-muted: #8b8d98;
    --accent: #6366f1;
    --accent-hover: #818cf8;
    --success: #22c55e;
    --error: #ef4444;
    --code-bg: #12141c;
    --radius: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  header h1 span { color: var(--accent); }
  header .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 12px;
    background: var(--accent);
    color: #fff;
    font-weight: 500;
  }
  main { flex: 1; max-width: 860px; width: 100%; margin: 0 auto; padding: 32px 24px; }
  .input-group { margin-bottom: 20px; }
  label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; }
  textarea {
    width: 100%;
    min-height: 80px;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
    outline: none;
    transition: border-color .15s;
  }
  textarea:focus { border-color: var(--accent); }
  .row { display: flex; gap: 12px; align-items: flex-end; }
  .row .input-group { flex: 1; margin-bottom: 0; }
  input[type="text"] {
    width: 100%;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color .15s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  .actions { margin-top: 16px; display: flex; gap: 10px; }
  button {
    padding: 10px 24px;
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background .15s, opacity .15s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
  .btn-secondary { background: var(--surface); color: var(--text-muted); border: 1px solid var(--border); }
  .result-panel {
    margin-top: 28px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: none;
  }
  .result-panel.visible { display: block; }
  .result-header {
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 500;
  }
  .chip {
    font-size: 11px;
    padding: 2px 10px;
    border-radius: 12px;
    background: var(--accent);
    color: #fff;
    font-weight: 500;
  }
  .chip.success { background: var(--success); }
  .meta { color: var(--text-muted); margin-left: auto; font-size: 12px; }
  .result-body { padding: 16px; }
  .result-section { margin-bottom: 16px; }
  .result-section:last-child { margin-bottom: 0; }
  .result-section h3 { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    font-size: 13px;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-word;
    line-height: 1.5;
  }
  .error-box {
    margin-top: 28px;
    padding: 14px 16px;
    background: rgba(239,68,68,.1);
    border: 1px solid rgba(239,68,68,.25);
    border-radius: var(--radius);
    color: var(--error);
    font-size: 14px;
    display: none;
  }
  .error-box.visible { display: block; }
  .loading {
    display: none;
    margin-top: 28px;
    text-align: center;
    color: var(--text-muted);
    font-size: 14px;
  }
  .loading.visible { display: block; }
  .spinner {
    display: inline-block;
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .6s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
  }
  .suggestions { display: flex; flex-wrap: wrap; gap: 6px; }
  .suggestion {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  .suggestion:hover { border-color: var(--accent); color: var(--text); }
</style>
</head>
<body>
<header>
  <h1><span>NaturalQuery</span> Playground</h1>
  <span class="badge">DEV</span>
</header>
<main>
  <div class="input-group">
    <label>Question</label>
    <textarea id="question" placeholder="Ask a question in natural language, e.g. &quot;top 10 products by revenue this month&quot;"></textarea>
  </div>
  <div class="row">
    <div class="input-group">
      <label>Tenant ID (optional)</label>
      <input type="text" id="tenantId" placeholder="e.g. tenant-123">
    </div>
  </div>
  <div class="actions">
    <button class="btn-primary" id="runBtn" onclick="runQuery()">Run</button>
    <button class="btn-secondary" onclick="clearAll()">Clear</button>
  </div>
  <div class="loading" id="loading"><span class="spinner"></span>Generating SQL and executing query...</div>
  <div class="error-box" id="errorBox"></div>
  <div class="result-panel" id="resultPanel">
    <div class="result-header">
      <span>Result</span>
      <span class="chip" id="chartChip">table</span>
      <span class="meta" id="metaInfo"></span>
    </div>
    <div class="result-body">
      <div class="result-section"><h3>Title</h3><p id="resTitle"></p></div>
      <div class="result-section"><h3>Description</h3><p id="resDesc"></p></div>
      <div class="result-section"><h3>SQL</h3><pre id="resSql"></pre></div>
      <div class="result-section" id="suggestionsSection" style="display:none">
        <h3>Follow-up suggestions</h3>
        <div class="suggestions" id="resSuggestions"></div>
      </div>
      <div class="result-section"><h3>Data</h3><pre id="resData"></pre></div>
    </div>
  </div>
</main>
<footer>NaturalQuery &mdash; NL2SQL engine for .NET</footer>
<script>
const API = '{{API_PATH}}';
async function runQuery() {
  const q = document.getElementById('question').value.trim();
  if (!q) return;
  const tenantId = document.getElementById('tenantId').value.trim();
  const btn = document.getElementById('runBtn');
  const loading = document.getElementById('loading');
  const errorBox = document.getElementById('errorBox');
  const panel = document.getElementById('resultPanel');
  btn.disabled = true;
  loading.classList.add('visible');
  errorBox.classList.remove('visible');
  panel.classList.remove('visible');
  try {
    const body = { question: q };
    if (tenantId) body.tenantId = tenantId;
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    document.getElementById('chartChip').textContent = data.chartType || 'table';
    document.getElementById('metaInfo').textContent =
      `${data.tokensUsed || 0} tokens \u00b7 ${data.elapsedMs || 0}ms`;
    document.getElementById('resTitle').textContent = data.title || '';
    document.getElementById('resDesc').textContent = data.description || '';
    document.getElementById('resSql').textContent = data.sql || '';
    const tableData = data.tableData || data.chartData || [];
    document.getElementById('resData').textContent = JSON.stringify(tableData, null, 2);
    const sug = data.suggestions || [];
    const sugSection = document.getElementById('suggestionsSection');
    const sugContainer = document.getElementById('resSuggestions');
    sugContainer.innerHTML = '';
    if (sug.length > 0) {
      sugSection.style.display = '';
      sug.forEach(s => {
        const el = document.createElement('span');
        el.className = 'suggestion';
        el.textContent = s;
        el.onclick = () => { document.getElementById('question').value = s; runQuery(); };
        sugContainer.appendChild(el);
      });
    } else { sugSection.style.display = 'none'; }
    panel.classList.add('visible');
  } catch (e) {
    errorBox.textContent = e.message;
    errorBox.classList.add('visible');
  } finally {
    btn.disabled = false;
    loading.classList.remove('visible');
  }
}
function clearAll() {
  document.getElementById('question').value = '';
  document.getElementById('tenantId').value = '';
  document.getElementById('resultPanel').classList.remove('visible');
  document.getElementById('errorBox').classList.remove('visible');
}
document.getElementById('question').addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) runQuery();
});
</script>
</body>
</html>
